<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Kollector Studio</title>
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="robots" content="noindex">
<!--
  Single Page Apps for GitHub Pages — rafgraph/spa-github-pages technique.
  Path-based routes (kollector.studio/djname) hit 404 on GH Pages because
  the static host has no /djname file. We catch the 404 here, redirect to
  /?/djname (encoded), and let index.html un-encode it back into a real
  pathname before React boots. The end result is the address bar shows
  /djname while the SPA receives the path and renders the public profile.
-->
<script type="text/javascript">
  var pathSegmentsToKeep = 0;
  var l = window.location;
  l.replace(
    l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
    l.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/') + '/?/' +
    l.pathname.slice(1).split('/').slice(pathSegmentsToKeep).join('/').replace(/&/g, '~and~') +
    (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
    l.hash
  );
</script>
</head>
<body></body>
</html>
