<!DOCTYPE html>

<head>
<meta charset="UTF-8" />
<!-- SPA path-based routing decoder. 404.html redirects /djname to /?/djname;
     this script reverses that back to /djname before the SPA boots so the
     address bar matches what the user typed. Runs synchronously to beat
     React rendering. -->
<script type="text/javascript">
  (function(l) {
    if (l.search && l.search[1] === '/') {
      var decoded = l.search.slice(1).split('&').map(function(s) {
        return s.replace(/~and~/g, '&');
      }).join('?');
      window.history.replaceState(null, null,
        l.pathname.slice(0, -1) + decoded + l.hash
      );
    }
  }(window.location));
</script>

<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; height: 100%; overflow: hidden; }
  body {
    font-family: 'Space Grotesk', -apple-system, system-ui, sans-serif;
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
  }

  .app.dark {
    --bg: #0E0C0A;
    --fg: #F4EFE6;
    --dim: rgba(244,239,230,0.55);
    --border: rgba(244,239,230,0.10);
    --hover: rgba(244,239,230,0.04);
    --panel: #17130F;
    --sidebar-bg: #0A0806;
    --on-accent: #0E0C0A;
  }
  .app.light {
    --bg: #F4EFE6;
    --fg: #0E0C0A;
    --dim: rgba(14,12,10,0.55);
    --border: rgba(14,12,10,0.12);
    --hover: rgba(14,12,10,0.04);
    --panel: #FBF8F1;
    --sidebar-bg: #EDE6D7;
    --on-accent: #0E0C0A;
  }
  .app.warm {
    --bg: #1A1410;
    --fg: #F4DCB8;
    --dim: rgba(244,220,184,0.55);
    --border: rgba(244,220,184,0.12);
    --hover: rgba(244,220,184,0.05);
    --panel: #241B14;
    --sidebar-bg: #120D09;
    --on-accent: #1A1410;
  }

  button { font-family: inherit; }
  input { font-family: inherit; }

  /* Brand logo. The PNG is dark-on-transparent (KOLLECTOR in black, STUDIO in
     yellow). On light themes it renders natively. On dark themes we flip the
     luminance with invert() while preserving the yellow STUDIO via a hue
     rotation — invert+hue-rotate(180) is a no-op for fully saturated yellow,
     so STUDIO stays yellow while the black KOLLECTOR becomes cream. */
  .app.dark .brand-logo, .app.warm .brand-logo {
    filter: invert(1) hue-rotate(180deg);
  }

  /* Public profile layout. Inline JSX styles set the desktop look (press-kit
     hero with side-by-side bio + portrait, 4-up stat strip, big display
     headline). These overrides reflow at narrower widths. */

  /* Tablet — collapse the 2-column hero to stacked but keep stats 4-up. */
  @media (max-width: 760px) {
    .cs-profile-hero {
      grid-template-columns: 1fr !important;
    }
    .cs-profile-portrait {
      min-height: 200px !important;
    }
    .cs-profile-display {
      font-size: 52px !important;
      letter-spacing: -1.8px !important;
    }
  }

  /* Phone — 2x2 stat grid, smaller headline, tighter padding. */
  @media (max-width: 540px) {
    .cs-profile-bar {
      flex-direction: column !important;
      align-items: flex-start !important;
      gap: 10px !important;
    }
    /* Slug URL is too long for narrow viewports — drop it from the bar.
       Address bar still shows the URL, share button still copies it. */
    .cs-profile-bar-slug {
      display: none !important;
    }
    .cs-profile-actions {
      width: 100% !important;
    }
    .cs-profile-display {
      font-size: 42px !important;
      letter-spacing: -1.4px !important;
      line-height: 0.95 !important;
    }
    .cs-profile-stats {
      grid-template-columns: 1fr 1fr !important;
    }
    .cs-stat-cell {
      border-bottom: 1px solid var(--border);
    }
    .cs-stat-cell:nth-child(2n) {
      border-right: none !important;
    }
    .cs-stat-cell:nth-last-child(-n+2) {
      border-bottom: none;
    }
    .cs-counter-value {
      font-size: 22px !important;
    }
  }

  /* iOS zooms <input>/<textarea>/<select> on focus if font-size < 16px. Force
     16px on mobile viewports to disable the zoom, overriding inline styles
     that use smaller fonts for visual density on desktop. */
  @media (max-width: 768px) {
    input, textarea, select {
      font-size: 16px !important;
    }
    /* Hide the static attribution footer on mobile — GetSongBPM's verifier
       still sees the link in raw HTML, but it doesn't take up screen space
       on a phone. Desktop shows it in the bottom-right corner. */
    footer[data-cs-attribution] {
      display: none !important;
    }
  }

  ::-webkit-scrollbar { width: 8px; height: 8px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--dim); }

  /* Tweaks panel */
  .tweaks-panel {
    position: fixed; right: 20px; bottom: 20px;
    width: 280px; padding: 16px;
    background: var(--panel); border: 1px solid var(--border); border-radius: 12px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    z-index: 100; display: none;
    font-family: 'Space Grotesk', sans-serif;
    color: var(--fg);
  }
  .tweaks-panel.open { display: block; }
  .tweaks-header {
    display: flex; justify-content: space-between; align-items: center;
    margin-bottom: 14px;
    font-family: 'JetBrains Mono', monospace; font-size: 10px;
    letter-spacing: 1.5px; text-transform: uppercase; color: var(--dim);
  }
  .tweaks-row { margin-bottom: 14px; }
  .tweaks-row:last-child { margin-bottom: 0; }
  .tweaks-label {
    font-family: 'JetBrains Mono', monospace; font-size: 9px;
    letter-spacing: 1.2px; text-transform: uppercase; color: var(--dim);
    margin-bottom: 6px; display: block;
  }
  .tweaks-seg {
    display: grid; grid-auto-flow: column; grid-auto-columns: 1fr;
    gap: 2px; padding: 2px;
    background: var(--hover); border-radius: 6px; border: 1px solid var(--border);
  }
  .tweaks-seg button {
    padding: 6px 8px; border: none; border-radius: 4px;
    background: transparent; color: var(--fg); cursor: pointer;
    font-size: 11px; font-weight: 600;
    font-family: 'JetBrains Mono', monospace;
    letter-spacing: 0.5px; text-transform: uppercase;
  }
  .tweaks-seg button.active { background: var(--accent); color: var(--on-accent); }
  .tweaks-accents { display: flex; gap: 8px; }
  .tweaks-accents button {
    width: 28px; height: 28px; border-radius: 50%;
    border: 2px solid var(--border); cursor: pointer; padding: 0;
  }
  .tweaks-accents button.active { border-color: var(--fg); transform: scale(1.1); }

  .tweak-toggle-btn {
    position: fixed; right: 20px; bottom: 20px;
    width: 44px; height: 44px; border-radius: 22px;
    background: var(--accent); color: var(--on-accent);
    border: none; cursor: pointer; font-size: 18px;
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 8px 24px rgba(0,0,0,0.3); z-index: 99;
  }
</style>

<script>
  const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
    "theme": "light",
    "accent": "acid",
    "density": "comfortable",
    "viewStyle": "grid",
    "showOverlays": true
  }/*EDITMODE-END*/;

  const ACCENTS = {
    acid: '#E8FF4A',
    hotpink: '#FF4A9E',
    cyan: '#4AE8FF',
    tangerine: '#FF8A3D',
    violet: '#B07AFF',
  };
</script>

<script type="text/babel">
// Hash + pathname router. Resolves three things in priority order:
//   1. /#u/{user_id} — legacy hash route, kept for backwards compat with old
//      shared links.
//   2. /{slug} — pathname route. Reaches the SPA via the 404.html redirect
//      trick on GitHub Pages (see 404.html and the early script in <head>).
//      Reserved words still resolve as profile attempts; they just have no
//      claimed profile so PublicProfilePage shows the "not found" panel.
//      That's better UX than dumping into the workspace shell.
//   3. fallthrough = the regular app shell.
// Re-evaluates on hashchange + popstate so back/forward + manual hash edits
// + programmatic navigation all stay in sync.
function useHashRoute() {
  const parse = () => {
    const hashMatch = (window.location.hash || '').match(/^#u\/([^/?]+)/);
    if (hashMatch) {
      return { kind: 'profile', userId: decodeURIComponent(hashMatch[1]) };
    }
    let path = (window.location.pathname || '/').replace(/^\/+|\/+$/g, '');
    if (!path) return { kind: 'app' };
    if (path.includes('/')) return { kind: 'app' }; // multi-segment = not a slug
    // Auto-normalize uppercase paths so /Andres becomes /andres without the
    // user noticing. Slugs are always stored lowercase.
    const lower = path.toLowerCase();
    if (lower !== path) {
      try {
        window.history.replaceState(null, '',
          '/' + lower + window.location.search + window.location.hash);
      } catch {}
      path = lower;
    }
    if (/^[a-z0-9](?:[a-z0-9-]*[a-z0-9])?$/.test(path)) {
      return { kind: 'profile', slug: path };
    }
    return { kind: 'app' };
  };
  const [route, setRoute] = React.useState(parse);
  React.useEffect(() => {
    const onChange = () => setRoute(parse());
    window.addEventListener('hashchange', onChange);
    window.addEventListener('popstate', onChange);
    return () => {
      window.removeEventListener('hashchange', onChange);
      window.removeEventListener('popstate', onChange);
    };
  }, []);
  return route;
}

function Root() {
  const [tweaks, setTweaks] = React.useState(() => {
    const saved = localStorage.getItem('cs-tweaks');
    if (saved) { try { return { ...TWEAK_DEFAULTS, ...JSON.parse(saved) }; } catch {} }
    return TWEAK_DEFAULTS;
  });
  const [editMode, setEditMode] = React.useState(false);
  const session = useSession();

  // Namespace localStorage per user so friends share a browser without clobbering each other.
  // MUST run synchronously during render (before child state initializers read storage),
  // otherwise reads hit the unprefixed key while writes hit the prefixed one.
  const userId = session?.user?.id || null;
  if (window.__csUserId !== userId) {
    const ns = userId ? `cs-u-${userId}-` : 'cs-';
    const origGet = Storage.prototype.__origGet || localStorage.getItem.bind(localStorage);
    const origSet = Storage.prototype.__origSet || localStorage.setItem.bind(localStorage);
    const origDel = Storage.prototype.__origDel || localStorage.removeItem.bind(localStorage);
    Storage.prototype.__origGet = origGet;
    Storage.prototype.__origSet = origSet;
    Storage.prototype.__origDel = origDel;
    const keys = ['cs-set', 'cs-records', 'cs-crates', 'cs-saved-sets',
      'cs-current-name', 'cs-profile'];
    localStorage.getItem = (k) => keys.includes(k) ? origGet(ns + k) : origGet(k);
    localStorage.setItem = (k, v) => keys.includes(k) ? origSet(ns + k, v) : origSet(k, v);
    localStorage.removeItem = (k) => keys.includes(k) ? origDel(ns + k) : origDel(k);
    // One-time migration: if the namespaced slot is empty but legacy un-prefixed
    // data exists, copy it over so existing users don't lose their collection.
    if (userId) {
      for (const k of keys) {
        if (origGet(ns + k) == null && origGet(k) != null) origSet(ns + k, origGet(k));
      }
    }
    window.__csUserId = userId;
  }

  React.useEffect(() => {
    localStorage.setItem('cs-tweaks', JSON.stringify(tweaks));
    document.documentElement.style.setProperty('--accent', ACCENTS[tweaks.accent] || tweaks.accent);
  }, [tweaks]);

  // Edit mode protocol
  React.useEffect(() => {
    const handler = (e) => {
      if (e.data?.type === '__activate_edit_mode') setEditMode(true);
      else if (e.data?.type === '__deactivate_edit_mode') setEditMode(false);
    };
    window.addEventListener('message', handler);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', handler);
  }, []);

  const updateTweak = (patch) => {
    const next = { ...tweaks, ...patch };
    setTweaks(next);
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits: patch }, '*');
  };

  // Hash-based routing for public profiles. /#u/{user_id} is reachable
  // signed-out (RLS allows anon to read public/discoverable rows) and
  // overrides the normal session-gated app shell.
  const route = useHashRoute();

  if (route.kind === 'profile') {
    return (
      <div className={`app ${tweaks.theme}`}>
        <PublicProfilePage
          userId={route.userId} slug={route.slug}
          viewerSession={session}
          onExit={() => {
            // Clear both pathname and hash so we land on the bare app root.
            // Use replaceState so the public URL doesn't pile up in history.
            if (window.location.pathname !== '/' || window.location.hash) {
              window.history.replaceState(null, '', '/');
              window.dispatchEvent(new PopStateEvent('popstate'));
            }
          }} />
      </div>
    );
  }

  if (session === undefined) {
    return (
      <div className={`app ${tweaks.theme}`} style={{
        minHeight: '100vh', display: 'flex', alignItems: 'center',
        justifyContent: 'center', background: 'var(--bg)', color: 'var(--dim)',
        fontFamily: 'JetBrains Mono, monospace', fontSize: 11, letterSpacing: 1.5,
        textTransform: 'uppercase',
      }}>Loading…</div>
    );
  }
  if (!session) {
    return <SignInScreen tweaks={tweaks} />;
  }

  return (
    <>
      <CollectorStudio key={session.user.id} tweaks={tweaks} setTweaks={setTweaks}
        user={session.user} onSignOut={signOut} />
      {editMode && (
        <div className="tweaks-panel open">
          <div className="tweaks-header">
            <span>Tweaks</span>
            <span style={{ color: 'var(--accent)' }}>● live</span>
          </div>

          <div className="tweaks-row">
            <span className="tweaks-label">Theme</span>
            <div className="tweaks-seg">
              {['dark', 'light', 'warm'].map(t => (
                <button key={t} className={tweaks.theme === t ? 'active' : ''}
                  onClick={() => updateTweak({ theme: t })}>{t}</button>
              ))}
            </div>
          </div>

          <div className="tweaks-row">
            <span className="tweaks-label">Accent</span>
            <div className="tweaks-accents">
              {Object.entries(ACCENTS).map(([key, hex]) => (
                <button key={key} className={tweaks.accent === key ? 'active' : ''}
                  style={{ background: hex }} onClick={() => updateTweak({ accent: key })} title={key} />
              ))}
            </div>
          </div>

          <div className="tweaks-row">
            <span className="tweaks-label">Collection view</span>
            <div className="tweaks-seg">
              {['grid', 'list', 'stack'].map(v => (
                <button key={v} className={tweaks.viewStyle === v ? 'active' : ''}
                  onClick={() => updateTweak({ viewStyle: v })}>{v}</button>
              ))}
            </div>
          </div>

          <div className="tweaks-row">
            <span className="tweaks-label">Density</span>
            <div className="tweaks-seg">
              {['comfortable', 'compact'].map(d => (
                <button key={d} className={tweaks.density === d ? 'active' : ''}
                  onClick={() => updateTweak({ density: d })}>{d}</button>
              ))}
            </div>
          </div>

          <div className="tweaks-row">
            <span className="tweaks-label">BPM / Key overlays</span>
            <div className="tweaks-seg">
              <button className={tweaks.showOverlays ? 'active' : ''}
                onClick={() => updateTweak({ showOverlays: true })}>Show</button>
              <button className={!tweaks.showOverlays ? 'active' : ''}
                onClick={() => updateTweak({ showOverlays: false })}>Hide</button>
            </div>
          </div>
        </div>
      )}
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(
  <ErrorBoundary><Root /></ErrorBoundary>
);
</script>

</body>
